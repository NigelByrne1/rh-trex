# NOT used on Konflux Staging — git resolver rejects PipelineRun (use pipelines/ instead).
# Kept as reference for clusters that support resourceKind: pipelinerun.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: integration-footnote-demo-
spec:
  pipelineSpec:
    description: Demo pipeline to force TEST_OUTPUT.note in integration status comments
    tasks:
      - name: demo-failure-with-note
        params:
          - name: RESULT
            value: FAILURE
          - name: NOTE
            value: "https://example.com/forced-artifact-link-scenario-a"
          - name: FAILURES
            value: "1"
          - name: WARNINGS
            value: "0"
          - name: SUCCESSES
            value: "0"
        taskSpec:
          results:
            - name: TEST_OUTPUT
              description: Standardized test output (JSON)
          params:
            - name: RESULT
              type: string
            - name: NOTE
              type: string
            - name: FAILURES
              type: string
            - name: WARNINGS
              type: string
            - name: SUCCESSES
              type: string
          steps:
            - name: write-test-output
              image: quay.io/konflux-ci/konflux-test:latest
              computeResources:
                limits:
                  memory: 256Mi
                requests:
                  memory: 128Mi
                  cpu: 100m
              script: |
                #!/bin/bash
                set -euo pipefail
                TEST_OUTPUT=$(jq -rc \
                  --arg date "$(date -u --iso-8601=seconds)" \
                  --arg result "$(params.RESULT)" \
                  --arg note "$(params.NOTE)" \
                  --argjson failures "$(params.FAILURES)" \
                  --argjson warnings "$(params.WARNINGS)" \
                  --argjson successes "$(params.SUCCESSES)" \
                  --null-input \
                  '{result: $result, timestamp: $date, note: $note, successes: $successes, failures: $failures, warnings: $warnings}')
                echo -n "${TEST_OUTPUT}" | tee "$(results.TEST_OUTPUT.path)"
      - name: demo-failure-with-same-note
        params:
          - name: RESULT
            value: FAILURE
          - name: NOTE
            value: "https://example.com/forced-artifact-link-scenario-a"
          - name: FAILURES
            value: "1"
          - name: WARNINGS
            value: "0"
          - name: SUCCESSES
            value: "0"
        taskSpec:
          results:
            - name: TEST_OUTPUT
              description: Standardized test output (JSON)
          params:
            - name: RESULT
              type: string
            - name: NOTE
              type: string
            - name: FAILURES
              type: string
            - name: WARNINGS
              type: string
            - name: SUCCESSES
              type: string
          steps:
            - name: write-test-output
              image: quay.io/konflux-ci/konflux-test:latest
              computeResources:
                limits:
                  memory: 256Mi
                requests:
                  memory: 128Mi
                  cpu: 100m
              script: |
                #!/bin/bash
                set -euo pipefail
                TEST_OUTPUT=$(jq -rc \
                  --arg date "$(date -u --iso-8601=seconds)" \
                  --arg result "$(params.RESULT)" \
                  --arg note "$(params.NOTE)" \
                  --argjson failures "$(params.FAILURES)" \
                  --argjson warnings "$(params.WARNINGS)" \
                  --argjson successes "$(params.SUCCESSES)" \
                  --null-input \
                  '{result: $result, timestamp: $date, note: $note, successes: $successes, failures: $failures, warnings: $warnings}')
                echo -n "${TEST_OUTPUT}" | tee "$(results.TEST_OUTPUT.path)"
